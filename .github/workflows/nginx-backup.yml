name: Nginx Backup (Python version)

on:
  workflow_call:
    inputs:
      backup_dir:
        type: string
        default: "${{ vars.NGINX_BAK_PATH }}"

jobs:
  backup:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout DevOpsTemplates
        uses: actions/checkout@v4
        with:
          repository: leoserverteam/DevOpsTemplates
          path: templates

      - name: Run Backup Script
        env:
          # Прокидываем переменные окружения для Python
          BAK_PATH: ${{ inputs.backup_dir }}
          SRC_PATH: ${{ vars.NGINX_PATH }} # Предположим, путь источника тоже в vars
        run: python3 templates/backupnginx.py
