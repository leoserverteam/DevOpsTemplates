name: Reusable Docker Deploy

on:
  workflow_call:
    # Оставляем inputs, если захотим уточнить подпапку для конкретного проекта
    inputs:
      project_name:
        required: true
        type: string

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Organziation Path
        run: |
          # Используем DEPLOY_PATH из переменных организации и добавляем имя проекта
          # Если DEPLOY_PATH в переменной это /mnt/.../deploy
          TARGET_DIR="${{ vars.DEPLOY_PATH }}/${{ inputs.project_name }}"
          
          mkdir -p $TARGET_DIR
          cp docker-compose.yml $TARGET_DIR/
          
          cd $TARGET_DIR
          docker-compose pull
          docker-compose up -d
